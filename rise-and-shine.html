<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rise&amp;Shine – Case Study · Jade Riedlkovacs</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #ffffff;
      color: #101828;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ── Nav ─────────────────────────────────────────── */
    .nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-bottom: 1px solid #e5e7eb;
      padding: 0 40px;
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .nav-logo {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .nav-logo img { width: 40px; height: 40px; }

    .btn-contact {
      background: #c3acda;
      color: #101828;
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      padding: 11px 24px;
      cursor: pointer;
      text-decoration: none;
      letter-spacing: -0.2px;
      transition: background 0.15s;
    }

    .btn-contact:hover { background: #b49cce; }

    /* ── PDF Viewer ──────────────────────────────────── */
    .pdf-wrapper {
      flex: 1;
      display: flex;
      padding: 40px 60px;
      background: #f8f2ff;
    }

    .pdf-embed {
      width: 100%;
      height: calc(100vh - 72px - 80px - 80px);
      min-height: 600px;
      border: none;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.1);
      display: block;
    }

    .pdf-fallback {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 80px 40px;
      text-align: center;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.1);
    }

    .pdf-fallback p {
      font-size: 17px;
      color: #4a5565;
      line-height: 1.6;
    }

    .btn-download {
      background: #a179d7;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      font-size: 15px;
      border: none;
      border-radius: 10px;
      padding: 12px 28px;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s;
    }

    .btn-download:hover { background: #8f65c8; }

    /* ── Footer ──────────────────────────────────────── */
    .footer {
      padding: 40px 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 24px;
      max-width: 1600px;
      margin: 0 auto;
      width: 100%;
    }

    .footer-heading {
      font-size: 20px;
      font-weight: 500;
      color: #101828;
      margin-bottom: 6px;
      letter-spacing: -0.45px;
    }

    .footer-sub {
      font-size: 17px;
      color: #4a5565;
      letter-spacing: -0.31px;
    }

    .footer-links {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .footer-email {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 17px;
      color: #364153;
      text-decoration: none;
      letter-spacing: -0.31px;
      transition: color 0.15s;
    }

    .footer-email:hover { color: #101828; }
    .footer-email img { width: 22px; height: 22px; }

    .footer-social {
      width: 38px;
      height: 38px;
      background: #e5e7eb;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      transition: background 0.15s;
    }

    .footer-social:hover { background: #d1d5db; }
    .footer-social img { width: 18px; height: 18px; }

    /* ── Responsive ──────────────────────────────────── */
    @media (max-width: 860px) {
      .nav { padding: 0 24px; }
      .pdf-wrapper { padding: 24px; }
      .footer { flex-direction: column; align-items: flex-start; padding: 32px 24px; }
    }
  </style>
</head>
<body>

  <!-- Nav -->
  <nav class="nav">
    <a href="index.html" class="nav-logo">
      <img src="assets/icon-home.svg" alt="Home" />
    </a>
    <a href="mailto:riedlkovacsj@gmail.com" class="btn-contact">Contact</a>
  </nav>

  <!-- PDF Viewer -->
  <div class="pdf-wrapper">
    <object
      class="pdf-embed"
      data="assets/rise-and-shine.pdf"
      type="application/pdf"
    >
      <div class="pdf-fallback">
        <p>Your browser doesn't support inline PDFs.<br>Click below to open the case study.</p>
        <a class="btn-download" href="assets/rise-and-shine.pdf" target="_blank">Open PDF</a>
      </div>
    </object>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <div>
      <div class="footer-heading">Let's Connect</div>
      <div class="footer-sub">Always open to new opportunities and collaborations</div>
    </div>
    <div class="footer-links">
      <a class="footer-email" href="mailto:riedlkovacsj@gmail.com">
        <img src="assets/icon-email.svg" alt="" aria-hidden="true" />
        riedlkovacsj@gmail.com
      </a>
      <a class="footer-social" href="#" title="LinkedIn" aria-label="LinkedIn">
        <img src="assets/icon-linkedin.svg" alt="LinkedIn" />
      </a>
      <a class="footer-social" href="#" title="Social" aria-label="Social">
        <img src="assets/icon-social.svg" alt="Social" />
      </a>
    </div>
  </footer>

</body>
</html>
